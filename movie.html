<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Dynamic SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%23000'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Inter, sans-serif' font-weight='900' font-size='50' fill='%23fff'%3EM%3C/text%3E%3C/svg%3E">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f2f6f9;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .fade-enter {
            opacity: 0;
            transform: scale(1.05);
        }
        .fade-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 700ms, transform 700ms;
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* --- TOUCH AND MOBILE UI OPTIMIZATIONS --- */
        
        /* Eliminate 300ms double-tap delay on all interactive elements & remove native touch highlight on iOS */
        a, button, select, input, textarea, [role="button"], .cursor-pointer {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Smooth scrollable lists with touch deceleration physics */
        .overflow-x-auto, .overflow-y-auto {
            -webkit-overflow-scrolling: touch;
        }

        /* Crucial Tap Fix for Touch Screens:
           On hover-capable devices (desktop), hover effects work great.
           On touchscreens, the first tap fires a 'mouseenter/mouseover' sequence which triggers :hover styles.
           If the :hover style transforms (scales, translates, or shifts) the element, its physical bounding box 
           moves. When the browser finishes the tap sequence and tries to synthesize a 'click' event at the 
           touch coordinates, the element has already moved out of the hit target or shifted, cancelling the tap 
           or misrouting it! The user is forced to tap a second time to trigger the actual action.
           We completely bypass this click-misfire bug by resetting transform hover effects on touch devices.
        */
        @media (hover: none) {
            /* Disable translate animations on tap/hover */
            .hover\:-translate-y-1:hover,
            .hover\:-translate-y-1:active,
            .group:hover .group-hover\:-translate-y-1 {
                transform: none !important;
                transition: none !important;
            }

            /* Disable poster & image zooming scales on hover/active */
            .group:hover .group-hover\:scale-105,
            .group-hover\:scale-105:hover,
            .hover\:scale-105:hover,
            .hover\:scale-105:active,
            .group:active .group-hover\:scale-105 {
                transform: none !important;
                transition: none !important;
            }

            .group:hover .group-hover\:scale-110,
            .group-hover\:scale-110:hover,
            .hover\:scale-110:hover,
            .hover\:scale-110:active,
            .group:active .group-hover\:scale-110 {
                transform: none !important;
                transition: none !important;
            }

            /* Disable container scale shrinking on tap, which makes inner buttons (like selects or checkmarks) jump & fail to register clicks */
            .active\:scale-98:active,
            .active\:scale-95:active,
            .active\:scale-90:active {
                transform: none !important;
                transition: none !important;
            }

            /* Keep transitions functional for opacity/color only, but disable transform-related ones to prevent layout shifting on tap */
            .transition-transform, .transition-all {
                transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- SUPABASE CLIENT SETUP ---
        const SUPABASE_URL = 'https://fwzffqwjprjuwidkrckb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3emZmcXdqcHJqdXdpZGtyY2tiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgwMTMwNzMsImV4cCI6MjA2MzU4OTA3M30.p3b_pshzTN-G3QTKE91b5TGBZJwSRZTEOClXN5JEl6I';
        
        // Fixed: Use window.supabase to avoid ReferenceError initialization loop
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- ICON WRAPPER COMPONENT ---
        const Icon = ({ name, className = "h-4 w-4", ...props }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (containerRef.current && name) {
                    const iconObj = lucide.icons[name];
                    if (iconObj) {
                        containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                        lucide.createIcons({
                            nameAttr: 'data-lucide',
                            icons: { [name]: iconObj }
                        });
                    } else {
                        containerRef.current.innerHTML = '';
                    }
                }
            }, [name, className]);

            return <span ref={containerRef} {...props} className={`inline-flex items-center justify-center ${props.className || ''}`}></span>;
        };

        // --- CONSTANTS ---
        const TMDB_API_KEY = 'e9b4a6ba169a41fbbe8d5db08584c138';
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';

        const GENRE_MAP_MOVIE = {
            'Action': 28, 'Adventure': 12, 'Animation': 16, 'Comedy': 35,
            'Crime': 80, 'Documentary': 99, 'Drama': 18, 'Family': 10751,
            'Fantasy': 14, 'History': 36, 'Horror': 27, 'Music': 10402,
            'Mystery': 9648, 'Romance': 10749, 'Sci-Fi': 878, 'Thriller': 53, 'War': 10752
        };

        const GENRE_MAP_TV = {
            'Action': 10759, 'Adventure': 10759, 'Animation': 16, 'Comedy': 35,
            'Crime': 80, 'Documentary': 99, 'Drama': 18, 'Family': 10751,
            'Fantasy': 10765, 'Mystery': 9648, 'Sci-Fi': 10765, 'Soap': 10766, 'War': 10768
        };

        const COUNTRY_MAP = {
            'United States': 'US', 'Japan': 'JP', 'United Kingdom': 'GB', 
            'South Korea': 'KR', 'France': 'FR', 'Spain': 'ES', 'Canada': 'CA'
        };

        const GENRES_BOARD = [
            { name: 'Action', icon: 'Swords' },
            { name: 'Comedy', icon: 'Smile' },
            { name: 'Historical', icon: 'Landmark' },
            { name: 'Drama', icon: 'BookOpen' },
            { name: 'Sci fi', icon: 'Rocket' },
            { name: 'Fantasy', icon: 'Wand2' },
            { name: 'Musical', icon: 'Music' },
            { name: 'Documentary', icon: 'Film' },
        ];

        // --- HELPER UTILITY FOR FUTURE RELEASES ---
        const isFutureRelease = (dateString) => {
            if (!dateString) return false;
            const releaseDate = new Date(dateString);
            const today = new Date();
            return releaseDate > today;
        };

        // --- HELPER UTILITY FOR SERIES STATUS ---
        const getSeriesStatusInfo = (status, nextEpisode, forOverlay = false) => {
            if (!status) return { label: 'Unknown', colorClass: 'bg-gray-100 text-gray-600 border-gray-200' };
            const statusLower = status.toLowerCase();
            
            if (statusLower === 'ended') {
                return { 
                    label: 'Ended', 
                    colorClass: forOverlay 
                        ? 'bg-red-500/90 text-white border-red-400' 
                        : 'bg-red-50 text-red-600 border-red-100' 
                };
            }
            if (statusLower === 'canceled') {
                return { 
                    label: 'Canceled', 
                    colorClass: forOverlay 
                        ? 'bg-rose-600/90 text-white border-rose-400' 
                        : 'bg-rose-50 text-rose-600 border-rose-100' 
                };
            }
            if (statusLower === 'returning series') {
                if (nextEpisode) {
                    return { 
                        label: 'Ongoing', 
                        colorClass: forOverlay 
                            ? 'bg-emerald-600/95 text-white border-emerald-400 animate-pulse' 
                            : 'bg-emerald-50 text-emerald-600 border-emerald-100' 
                    };
                }
                return { 
                    label: 'Returning', 
                    colorClass: forOverlay 
                        ? 'bg-indigo-600/90 text-white border-indigo-400' 
                        : 'bg-indigo-50 text-indigo-600 border-indigo-100' 
                };
            }
            if (statusLower === 'in production' || statusLower === 'planned' || statusLower === 'post production') {
                return { 
                    label: 'Returning', 
                    colorClass: forOverlay 
                        ? 'bg-indigo-600/90 text-white border-indigo-400' 
                        : 'bg-indigo-50 text-indigo-600 border-indigo-100' 
                };
            }
            if (statusLower === 'pilot') {
                return { 
                    label: 'Upcoming', 
                    colorClass: forOverlay 
                        ? 'bg-amber-500/90 text-white border-amber-400' 
                        : 'bg-amber-50 text-amber-600 border-amber-100' 
                };
            }
            return { 
                label: status, 
                colorClass: forOverlay 
                    ? 'bg-blue-600/90 text-white border-blue-400' 
                    : 'bg-blue-50 text-blue-600 border-blue-100' 
            };
        };

        // --- SUB-COMPONENTS ---
        function Section({ title, items, onSelect, isLoading }) {
            const scrollContainerRef = useRef(null);
            const scroll = (direction) => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollBy({ left: direction === 'left' ? -300 : 300, behavior: 'smooth' });
                }
            };

            return (
                <div className="mb-10">
                    <div className="mb-5 flex items-center justify-between">
                        <h2 className="text-xl font-extrabold tracking-wide">{title}</h2>
                        {!isLoading && (
                            <div className="flex space-x-2">
                                <button onClick={() => scroll('left')} className="flex h-9 w-9 items-center justify-center rounded-full border border-gray-300 hover:bg-white shadow-sm transition-all">
                                    <Icon name="ChevronLeft" className="h-5 w-5 text-gray-600" />
                                </button>
                                <button onClick={() => scroll('right')} className="flex h-9 w-9 items-center justify-center rounded-full border border-gray-300 hover:bg-white shadow-sm transition-all">
                                    <Icon name="ChevronRight" className="h-5 w-5 text-gray-600" />
                                </button>
                            </div>
                        )}
                    </div>

                    {isLoading ? (
                        <div className="flex h-[300px] w-full items-center justify-center">
                            <div className="h-8 w-8 animate-spin rounded-full border-4 border-gray-300 border-t-black"></div>
                        </div>
                    ) : (
                        <div ref={scrollContainerRef} className="flex space-x-5 overflow-x-auto no-scrollbar pb-4 scroll-smooth">
                            {items.length > 0 ? items.map((item, i) => (
                                <div key={i} onClick={() => onSelect(item.id, item.type)} className="group flex w-[170px] shrink-0 cursor-pointer flex-col gap-3">
                                    <div className="relative h-[250px] w-full overflow-hidden rounded-[1.25rem] shadow-sm">
                                        <img src={item.image} alt={item.title} className="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    </div>
                                    <div>
                                        <div className="mb-1.5 flex items-center space-x-3 text-[11px] font-bold text-gray-500">
                                            <span className="flex items-center"><Icon name="Star" className="mr-1 h-3 w-3 text-gray-400 fill-white" /> {item.rating}</span>
                                            <span className="flex items-center"><Icon name="MessageCircle" className="mr-1 h-3 w-3 text-gray-400" /> {item.comments || Math.floor(Math.random() * 50)}</span>
                                        </div>
                                        <h3 className="text-[15px] font-extrabold text-gray-900 truncate">{item.title}</h3>
                                    </div>
                                </div>
                            )) : (
                                <div className="py-10 text-gray-400 font-bold">No results found for this category.</div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function LibraryMovieCard({ item, openDetails, handleRemoveTracking, handleTrackItem }) {
            const [movieDetails, setMovieDetails] = useState(null);

            useEffect(() => {
                let active = true;
                const fetchDetails = async () => {
                    try {
                        const url = `${TMDB_BASE_URL}/movie/${item.media_id}?api_key=${TMDB_API_KEY}`;
                        const res = await fetch(url);
                        if (res.ok && active) {
                            const data = await res.json();
                            setMovieDetails(data);
                        }
                    } catch (e) {
                        console.error(e);
                    }
                };
                fetchDetails();
                return () => { active = false; };
            }, [item.media_id]);

            const comingSoon = movieDetails && isFutureRelease(movieDetails.release_date);

            return (
                <div 
                    onClick={() => openDetails(item.media_id, 'movie')}
                    className="group relative flex flex-col bg-white/60 hover:bg-white backdrop-blur-md rounded-3xl border border-gray-100 p-2.5 sm:p-3.5 shadow-sm hover:shadow-xl transition-all duration-300 hover:-translate-y-1 active:scale-98 cursor-pointer select-none"
                >
                    <div className="aspect-[2/3] w-full rounded-2xl overflow-hidden mb-3.5 relative shadow-inner">
                        <img 
                            src={`https://image.tmdb.org/t/p/w500${item.poster_path}`} 
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" 
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-60"></div>
                        <span className="absolute top-2 left-2 rounded-full bg-black/60 backdrop-blur-md px-2.5 py-0.5 text-[9px] font-black tracking-widest uppercase border border-white/10 text-white">
                            MOVIE
                        </span>
                        {comingSoon && (
                            <span className="absolute top-2 right-2 rounded-full bg-amber-500/95 backdrop-blur-md px-2 py-0.5 text-[8px] font-black tracking-widest uppercase border border-amber-400 text-white flex items-center gap-1 shadow-lg animate-pulse">
                                <Icon name="Calendar" className="h-2.5 w-2.5" /> Coming Soon
                            </span>
                        )}
                        <span className="absolute bottom-2 left-2 text-[10px] font-bold text-white tracking-wide">
                            ★ {item.rating} TMDb
                        </span>
                    </div>
                    <div className="flex-1 flex flex-col justify-between">
                        <div>
                            <h3 className="text-sm sm:text-[15px] font-extrabold text-gray-900 group-hover:text-blue-600 transition-colors line-clamp-1 mb-1">
                                {item.title}
                            </h3>
                            <p className="text-[10px] sm:text-[11px] text-gray-500 font-semibold truncate mb-3">
                                {item.genres || 'Uncategorized'}
                            </p>
                        </div>
                        <div className="pt-3 border-t border-gray-100/80 flex items-center justify-between gap-2 sm:gap-3">
                            <select 
                                value={item.status} 
                                onClick={(e) => e.stopPropagation()}
                                onChange={(e) => handleTrackItem(item, e.target.value)}
                                className="text-[10px] sm:text-[11px] font-bold text-gray-600 bg-gray-50 border border-gray-200 rounded-xl px-2 sm:px-2.5 py-1.5 outline-none cursor-pointer focus:bg-white transition-all flex-1 min-w-0"
                            >
                                <option value="Watching">Watching</option>
                                <option value="Watched">Watched</option>
                                <option value="Plan to Watch">Plan to Watch</option>
                                <option value="On Hold">On Hold</option>
                                <option value="Dropped">Dropped</option>
                            </select>
                            <button 
                                onClick={(e) => { e.stopPropagation(); handleRemoveTracking(item.media_id, 'movie'); }}
                                className="p-1.5 text-red-500 hover:bg-red-50 rounded-xl border border-transparent hover:border-red-100 transition-all shrink-0"
                                title="Remove from Library"
                            >
                                <Icon name="Trash" className="h-3.5 w-3.5 sm:h-4 sm:w-4" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function LibraryTvCard({ item, openDetails, handleRemoveTracking, handleTrackItem, updateTvProgress }) {
            const [tvDetails, setTvDetails] = useState(null);
            const [seasonData, setSeasonData] = useState(null);
            const [isCardLoading, setIsCardLoading] = useState(true);

            const progressInfo = useMemo(() => {
                let prog = {};
                if (item.progress) {
                    prog = typeof item.progress === 'string' ? JSON.parse(item.progress) : item.progress;
                }
                const watched_episodes = prog?.watched_episodes || {};
                return { watched_episodes };
            }, [item.progress]);

            useEffect(() => {
                let active = true;
                const fetchDetails = async () => {
                    try {
                        const url = `${TMDB_BASE_URL}/tv/${item.media_id}?api_key=${TMDB_API_KEY}`;
                        const res = await fetch(url);
                        if (res.ok && active) {
                            const data = await res.json();
                            setTvDetails(data);
                        }
                    } catch (e) {
                        console.error(e);
                    } finally {
                        if (active) setIsCardLoading(false);
                    }
                };
                fetchDetails();
                return () => { active = false; };
            }, [item.media_id]);

            useEffect(() => {
                if (!tvDetails) return;
                const regularSeasons = tvDetails.seasons?.filter(s => s.season_number > 0) || [];
                const totalEpisodes = regularSeasons.reduce((acc, s) => acc + (s.episode_count || 0), 0);
                const watchedCount = Object.keys(progressInfo.watched_episodes).filter(k => progressInfo.watched_episodes[k] === true).length;
                
                if (item.status === 'Watched' && watchedCount < totalEpisodes && totalEpisodes > 0) {
                    handleTrackItem(item, 'Watching');
                }
            }, [tvDetails, progressInfo.watched_episodes, item.status]);

            const computedProgress = useMemo(() => {
                if (!tvDetails) return { nextS: 1, nextE: 1, totalEpisodes: 0, watchedCount: 0, foundNext: false };
                const regularSeasons = tvDetails.seasons?.filter(s => s.season_number > 0) || [];
                const totalEpisodes = regularSeasons.reduce((acc, s) => acc + (s.episode_count || 0), 0);

                const sortedSeasons = [...regularSeasons].sort((a, b) => a.season_number - b.season_number);
                let nextS = 1;
                let nextE = 1;
                let foundNext = false;

                for (const s of sortedSeasons) {
                    for (let ep = 1; ep <= s.episode_count; ep++) {
                        const key = `${s.season_number}_${ep}`;
                        if (!progressInfo.watched_episodes[key]) {
                            nextS = s.season_number;
                            nextE = ep;
                            foundNext = true;
                            break;
                        }
                    }
                    if (foundNext) break;
                }

                const watchedCount = Object.keys(progressInfo.watched_episodes).filter(k => progressInfo.watched_episodes[k] === true).length;

                return {
                    nextS,
                    nextE,
                    totalEpisodes,
                    watchedCount,
                    foundNext
                };
            }, [tvDetails, progressInfo.watched_episodes]);

            useEffect(() => {
                if (!tvDetails) return;
                let active = true;
                const fetchSeason = async () => {
                    try {
                        const url = `${TMDB_BASE_URL}/tv/${item.media_id}/season/${computedProgress.nextS}?api_key=${TMDB_API_KEY}`;
                        const res = await fetch(url);
                        if (res.ok && active) {
                            const data = await res.json();
                            setSeasonData(data);
                        }
                    } catch (e) {
                        console.error(e);
                    }
                };
                fetchSeason();
                return () => { active = false; };
            }, [tvDetails, computedProgress.nextS]);

            const nextEpisodeInfo = useMemo(() => {
                if (!seasonData) return { title: 'Loading...', isPremiere: false, isFinale: false, isNew: false };
                const ep = seasonData.episodes?.find(e => e.episode_number === computedProgress.nextE);
                if (!ep) return { title: `Episode ${computedProgress.nextE}`, isPremiere: false, isFinale: false, isNew: false };

                const isPremiere = computedProgress.nextE === 1;
                const isFinale = computedProgress.nextE === seasonData.episodes.length;

                let isNew = false;
                if (ep.air_date) {
                    const air = new Date(ep.air_date);
                    const now = new Date();
                    const diffTime = Math.abs(now - air);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    isNew = diffDays <= 30 && air <= now;
                }

                return {
                    title: ep.name || `Episode ${computedProgress.nextE}`,
                    isPremiere,
                    isFinale,
                    isNew
                };
            }, [seasonData, computedProgress.nextE]);

            const percentage = computedProgress.totalEpisodes > 0 
                ? Math.round((computedProgress.watchedCount / computedProgress.totalEpisodes) * 100) 
                : 0;

            const handleMarkWatched = (e) => {
                e.stopPropagation();
                const epKey = `${computedProgress.nextS}_${computedProgress.nextE}`;
                const updatedWatched = { ...progressInfo.watched_episodes, [epKey]: true };
                updateTvProgress(item.media_id, updatedWatched, computedProgress.totalEpisodes);
            };

            if (isCardLoading) {
                return (
                    <div className="bg-white/40 backdrop-blur-md rounded-2xl border border-white/20 p-4 shadow-sm animate-pulse h-[340px]">
                        <div className="bg-gray-200 h-48 rounded-xl mb-4" />
                        <div className="bg-gray-200 h-4 w-3/4 rounded mb-2" />
                        <div className="bg-gray-200 h-3 w-1/2 rounded" />
                    </div>
                );
            }

            const comingSoon = tvDetails && isFutureRelease(tvDetails.first_air_date);

            return (
                <div 
                    onClick={() => openDetails(item.media_id, 'tv')}
                    className="group relative flex flex-col bg-white/60 hover:bg-white backdrop-blur-md rounded-3xl border border-gray-100 p-2.5 sm:p-3.5 shadow-sm hover:shadow-xl transition-all duration-300 hover:-translate-y-1 active:scale-98 cursor-pointer select-none overflow-hidden"
                >
                    <div className="aspect-[2/3] w-full rounded-2xl overflow-hidden mb-3.5 relative shadow-inner">
                        <img 
                            src={`https://image.tmdb.org/t/p/w500${item.poster_path}`} 
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" 
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-60"></div>
                        <span className="absolute top-2 left-2 rounded-full bg-black/60 backdrop-blur-md px-2.5 py-0.5 text-[9px] font-black tracking-widest uppercase border border-white/10 text-white">
                            TV SHOW
                        </span>
                        {comingSoon ? (
                            <span className="absolute top-2 right-2 rounded-full bg-amber-500/95 backdrop-blur-md px-2 py-0.5 text-[8px] font-black tracking-widest uppercase border border-amber-400 text-white flex items-center gap-1 shadow-lg animate-pulse">
                                <Icon name="Calendar" className="h-2.5 w-2.5" /> Coming Soon
                            </span>
                        ) : (
                            tvDetails && tvDetails.status && (
                                (() => {
                                    const statusInfo = getSeriesStatusInfo(tvDetails.status, tvDetails.next_episode_to_air, true);
                                    return (
                                        <span className={`absolute top-2 right-2 rounded-full px-2 py-0.5 text-[8px] font-black tracking-widest uppercase border backdrop-blur-md shadow-sm ${statusInfo.colorClass}`}>
                                            {statusInfo.label}
                                        </span>
                                    );
                                })()
                            )
                        )}
                        <span className="absolute bottom-2 left-2 text-[9px] sm:text-[10px] font-bold text-white tracking-wide">
                            {computedProgress.watchedCount}/{computedProgress.totalEpisodes} Episodes ({percentage}%)
                        </span>
                    </div>

                    <div className="flex-1 flex flex-col justify-between">
                        <div>
                            <h3 className="text-sm sm:text-[15px] font-extrabold text-gray-900 group-hover:text-blue-600 transition-colors line-clamp-1 mb-2">
                                {item.title}
                            </h3>

                            <div key={`${computedProgress.nextS}_${computedProgress.nextE}`} className="bg-gray-50/70 border border-gray-100/50 rounded-2xl p-2 sm:p-2.5 flex items-center justify-between gap-1.5 sm:gap-3 animate-in fade-in duration-300 min-h-[50px] sm:min-h-[58px]">
                                <div className="overflow-hidden flex-1 min-w-0">
                                    <div className="flex flex-wrap items-center gap-1 sm:gap-1.5 mb-0.5 sm:mb-1">
                                        <span className="text-[9px] sm:text-[11px] font-black text-blue-600 uppercase tracking-wider">
                                            S{String(computedProgress.nextS).padStart(2, '0')} • E{String(computedProgress.nextE).padStart(2, '0')}
                                        </span>
                                        
                                        {computedProgress.foundNext && nextEpisodeInfo.isPremiere && (
                                            <span className="text-[7px] sm:text-[8px] font-black bg-emerald-50 text-green-600 border border-emerald-100 px-1 sm:px-1.5 py-0.5 rounded-md uppercase tracking-wider">Premiere</span>
                                        )}
                                        {computedProgress.foundNext && nextEpisodeInfo.isFinale && (
                                            <span className="text-[7px] sm:text-[8px] font-black bg-rose-50 text-red-600 border border-rose-100 px-1 sm:px-1.5 py-0.5 rounded-md uppercase tracking-wider">Finale</span>
                                        )}
                                        {computedProgress.foundNext && nextEpisodeInfo.isNew && (
                                            <span className="text-[7px] sm:text-[8px] font-black bg-blue-50 text-blue-600 border border-blue-100 px-1 sm:px-1.5 py-0.5 rounded-md uppercase tracking-wider">New</span>
                                        )}
                                    </div>
                                    <p className="text-[10px] sm:text-xs font-semibold text-gray-700 truncate">
                                        {computedProgress.foundNext ? nextEpisodeInfo.title : 'All Caught Up! 🎉'}
                                    </p>
                                </div>

                                {computedProgress.foundNext && (
                                    <button 
                                        onClick={handleMarkWatched}
                                        className="w-7 h-7 sm:w-10 sm:h-10 shrink-0 rounded-full border border-blue-100 bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-600 hover:text-white hover:border-blue-600 transition-all duration-300 shadow-sm active:scale-90"
                                        title="Mark episode as watched"
                                    >
                                        <Icon name="Check" className="h-3.5 w-3.5 sm:h-5 sm:w-5 stroke-[2.5]" />
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="mt-3.5 pt-3 border-t border-gray-100/80">
                            <div className="w-full bg-gray-100 h-1 rounded-full overflow-hidden mb-3">
                                <div className="bg-blue-600 h-full transition-all duration-500" style={{ width: `${percentage}%` }} />
                            </div>
                            <div className="flex items-center justify-between gap-2 sm:gap-3">
                                <select 
                                    value={item.status} 
                                    onClick={(e) => e.stopPropagation()}
                                    onChange={(e) => handleTrackItem(item, e.target.value)}
                                    className="text-[10px] sm:text-[11px] font-bold text-gray-600 bg-gray-50 border border-gray-200 rounded-xl px-2 sm:px-2.5 py-1.5 outline-none cursor-pointer focus:bg-white transition-all flex-1 min-w-0"
                                >
                                    <option value="Watching">Watching</option>
                                    <option value="Watched">Watched</option>
                                    <option value="Plan to Watch">Plan to Watch</option>
                                    <option value="On Hold">On Hold</option>
                                    <option value="Dropped">Dropped</option>
                                </select>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); handleRemoveTracking(item.media_id, 'tv'); }}
                                    className="p-1.5 text-red-500 hover:bg-red-50 rounded-xl border border-transparent hover:border-red-100 transition-all shrink-0"
                                    title="Remove from Library"
                                >
                                    <Icon name="Trash" className="h-3.5 w-3.5 sm:h-4 sm:w-4" />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [activeTab, setActiveTab] = useState('BOARD');
            const [isTrailerModalOpen, setIsTrailerModalOpen] = useState(false);
            const [fetchedShows, setFetchedShows] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [page, setPage] = useState(1);
            
            const [randomPageOffset, setRandomPageOffset] = useState(() => Math.floor(Math.random() * 50));

            const [filterYear, setFilterYear] = useState('');
            const [filterGenre, setFilterGenre] = useState('');
            const [filterCountry, setFilterCountry] = useState('');
            const [filterTimeframe, setFilterTimeframe] = useState('60');

            const [boardGenre, setBoardGenre] = useState('');
            const [trendingItems, setTrendingItems] = useState([]);
            const [isTrendingLoading, setIsTrendingLoading] = useState(false);
            const [boardNewItems, setBoardNewItems] = useState([]);
            const [isBoardNewLoading, setIsBoardNewLoading] = useState(false);
            const [comingSoonItems, setComingSoonItems] = useState([]);
            const [isComingSoonLoading, setIsComingSoonLoading] = useState(false);
            const [currentHeroIndex, setCurrentHeroIndex] = useState(0);

            const [popularMovies, setPopularMovies] = useState([]);
            const [popularTV, setPopularTV] = useState([]);
            const [topRated, setTopRated] = useState([]);
            const [isSectionsLoading, setIsSectionsLoading] = useState(false);

            const [searchInput, setSearchInput] = useState('');
            const [searchQuery, setSearchQuery] = useState('');

            const [selectedItem, setSelectedItem] = useState(null);
            const [detailsData, setDetailsData] = useState(null);
            const [isDetailsLoading, setIsDetailsLoading] = useState(false);

            const [selectedPerson, setSelectedPerson] = useState(null);
            const [personData, setPersonData] = useState(null);
            const [isPersonLoading, setIsPersonLoading] = useState(false);
            const [actorSort, setActorSort] = useState('popularity'); // popularity, newest, oldest
            
            const castScrollRef = useRef(null);

            // --- FAVORITES STATES ---
            const [favorites, setFavorites] = useState([]);
            const [favFilter, setFavFilter] = useState('all'); // all, movie, tv
            const [favGenreFilter, setFavGenreFilter] = useState('All'); 
            const [isFavLoading, setIsFavLoading] = useState(false);
            const [isActionInProgress, setIsActionInProgress] = useState(false);

            // --- TV TIME TRACKING STATES ---
            const [trackedItems, setTrackedItems] = useState([]);
            const [isTrackLoading, setIsTrackLoading] = useState(false);
            const [isTrackMenuOpen, setIsTrackMenuOpen] = useState(false);
            
            // Defers the default state from 'All' to 'Watching' for every fresh Library session
            const [libraryFilter, setLibraryFilter] = useState('Watching'); 
            const [userChangedFilter, setUserChangedFilter] = useState(false);
            
            const [libraryTypeFilter, setLibraryTypeFilter] = useState('All'); // All, movie, tv
            const [libraryGenreFilter, setLibraryGenreFilter] = useState('All');

            // Collapsible state for seasons checklist
            const [expandedSeasons, setExpandedSeasons] = useState({});
            const [seasonEpisodesMap, setSeasonEpisodesMap] = useState({});

            // --- BROWSER HISTORY ROUTING ENHANCEMENT ---
            const isRestoringRef = useRef(false);
            const stateRef = useRef();

            // Synchronize state values dynamically in Ref to fully bypass React closure limits in listener events
            stateRef.current = {
                activeTab, fetchedShows, page, randomPageOffset,
                filterYear, filterGenre, filterCountry, filterTimeframe,
                boardGenre, searchInput, searchQuery, selectedItem, selectedPerson,
                favFilter, favGenreFilter, libraryFilter, libraryTypeFilter, libraryGenreFilter
            };

            // Debounce replaceState calls to prevent UI lag and iOS Safari rate-limiting limits
            const replaceStateDebounceRef = useRef(null);
            const debouncedReplaceState = (state, title = '') => {
                if (replaceStateDebounceRef.current) {
                    clearTimeout(replaceStateDebounceRef.current);
                }
                replaceStateDebounceRef.current = setTimeout(() => {
                    try {
                        window.history.replaceState(state, title);
                    } catch (e) {
                        console.warn("History serialization failed:", e);
                    }
                }, 150);
            };

            // Restore React State from custom history snapshot
            const restoreStateSnapshot = (snapshot) => {
                if (!snapshot) return;
                isRestoringRef.current = true;

                if (snapshot.activeTab !== undefined) setActiveTab(snapshot.activeTab);
                if (snapshot.fetchedShows !== undefined) setFetchedShows(snapshot.fetchedShows);
                if (snapshot.page !== undefined) setPage(snapshot.page);
                if (snapshot.randomPageOffset !== undefined) setRandomPageOffset(snapshot.randomPageOffset);
                if (snapshot.filterYear !== undefined) setFilterYear(snapshot.filterYear);
                if (snapshot.filterGenre !== undefined) setFilterGenre(snapshot.filterGenre);
                if (snapshot.filterCountry !== undefined) setFilterCountry(snapshot.filterCountry);
                if (snapshot.filterTimeframe !== undefined) setFilterTimeframe(snapshot.filterTimeframe);
                if (snapshot.boardGenre !== undefined) setBoardGenre(snapshot.boardGenre);
                if (snapshot.searchInput !== undefined) setSearchInput(snapshot.searchInput);
                if (snapshot.searchQuery !== undefined) setSearchQuery(snapshot.searchQuery);
                if (snapshot.selectedItem !== undefined) setSelectedItem(snapshot.selectedItem);
                if (snapshot.selectedPerson !== undefined) setSelectedPerson(snapshot.selectedPerson);
                if (snapshot.favFilter !== undefined) setFavFilter(snapshot.favFilter);
                if (snapshot.favGenreFilter !== undefined) setFavGenreFilter(snapshot.favGenreFilter);
                if (snapshot.libraryFilter !== undefined) setLibraryFilter(snapshot.libraryFilter);
                if (snapshot.libraryTypeFilter !== undefined) setLibraryTypeFilter(snapshot.libraryTypeFilter);
                if (snapshot.libraryGenreFilter !== undefined) setLibraryGenreFilter(snapshot.libraryGenreFilter);

                // Re-position Scroll back to historical coordinate
                setTimeout(() => {
                    window.scrollTo(0, snapshot.scrollPosition || 0);
                    isRestoringRef.current = false;
                }, 80);
            };

            // Capture context, save state details to previous tab, and write a fresh history record
            const navigateToState = (updatedFields) => {
                const currentScroll = window.scrollY;
                const currentHistoryState = window.history.state || {};
                
                // Write immediately on manual click transition to guarantee routing trace preservation
                try {
                    window.history.replaceState({ ...currentHistoryState, scrollPosition: currentScroll }, '');
                } catch (e) {
                    console.warn(e);
                }

                const nextState = {
                    ...stateRef.current,
                    ...updatedFields,
                    scrollPosition: 0 // Reset scroll view to top of new target subpages
                };

                // Clear any pending debounced updates since we're writing a hard navigate
                if (replaceStateDebounceRef.current) {
                    clearTimeout(replaceStateDebounceRef.current);
                }

                try {
                    window.history.pushState(nextState, '');
                } catch (e) {
                    console.warn(e);
                }
                
                restoreStateSnapshot(nextState);
            };

            // Keep current history records updated continuously with secondary React state mutations (debounced to avoid blocking touches)
            useEffect(() => {
                if (isRestoringRef.current) return;
                const currentState = window.history.state || {};
                debouncedReplaceState({
                    ...currentState,
                    ...stateRef.current
                }, '');
            }, [
                activeTab, fetchedShows, page, randomPageOffset,
                filterYear, filterGenre, filterCountry, filterTimeframe,
                boardGenre, searchInput, searchQuery, selectedItem, selectedPerson,
                favFilter, favGenreFilter, libraryFilter, libraryTypeFilter, libraryGenreFilter
            ]);

            // Track page scrolls and cache top position (highly debounced to fully optimize frame-rate / gesture responsive behavior)
            useEffect(() => {
                const handleScrollSave = () => {
                    if (isRestoringRef.current) return;
                    const currentState = window.history.state;
                    if (currentState) {
                        debouncedReplaceState({
                            ...currentState,
                            scrollPosition: window.scrollY
                        }, '');
                    }
                };
                window.addEventListener('scroll', handleScrollSave, { passive: true });
                return () => window.removeEventListener('scroll', handleScrollSave);
            }, []);

            // Clean up timers on App Unmount
            useEffect(() => {
                return () => {
                    if (replaceStateDebounceRef.current) {
                        clearTimeout(replaceStateDebounceRef.current);
                    }
                };
            }, []);

            // Reset actor roles sort order whenever a new actor profile is loaded
            useEffect(() => {
                if (selectedPerson) {
                    setActorSort('popularity');
                }
            }, [selectedPerson]);

            // Handle landing or manual reload page queries
            useEffect(() => {
                if (window.history.state && window.history.state.activeTab) {
                    restoreStateSnapshot(window.history.state);
                } else {
                    const initialState = {
                        ...stateRef.current,
                        scrollPosition: 0
                    };
                    window.history.replaceState(initialState, '');
                }
            }, []);

            // Set popstate listener callback tracking native back actions
            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state) {
                        restoreStateSnapshot(event.state);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const trailerKey = useMemo(() => {
                if (!detailsData || !detailsData.videos || !detailsData.videos.results) return null;
                // Try finding an official Youtube Trailer
                const officialTrailer = detailsData.videos.results.find(
                    v => v.type === 'Trailer' && v.site === 'YouTube' && v.official === true
                );
                if (officialTrailer) return officialTrailer.key;
                
                // Try finding any Youtube Trailer
                const anyTrailer = detailsData.videos.results.find(
                    v => v.type === 'Trailer' && v.site === 'YouTube'
                );
                if (anyTrailer) return anyTrailer.key;

                // Fallback to clips / teasers
                const anyVideo = detailsData.videos.results.find(
                    v => v.site === 'YouTube'
                );
                return anyVideo ? anyVideo.key : null;
            }, [detailsData]);

            // Compose clean YouTube embed URL with dynamic origin parameter to bypass sandboxing errors
            const computedTrailerEmbedUrl = useMemo(() => {
                if (!trailerKey) return '';
                const base = `https://www.youtube.com/embed/${trailerKey}`;
                const params = ['autoplay=1', 'enablejsapi=1'];
                
                // Fetch window location origin safely to satisfy YouTube's strict embed referrer guards
                if (typeof window !== 'undefined' && window.location.origin && window.location.origin !== 'null') {
                    params.push(`origin=${encodeURIComponent(window.location.origin)}`);
                }
                
                return `${base}?${params.join('&')}`;
            }, [trailerKey]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setIsTrailerModalOpen(false);
                    }
                };
                if (isTrailerModalOpen) {
                    window.addEventListener('keydown', handleKeyDown);
                }
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isTrailerModalOpen]);

            const handleTabChange = (tab) => {
                navigateToState({
                    activeTab: tab,
                    page: 1,
                    randomPageOffset: Math.floor(Math.random() * 50),
                    filterYear: '',
                    filterGenre: '',
                    filterCountry: '',
                    filterTimeframe: '60',
                    selectedItem: null,
                    selectedPerson: null,
                    favGenreFilter: 'All',
                    libraryGenreFilter: 'All',
                    // Fallback to "Watching" on tab click, unless user explicitly changed it during the current active session
                    libraryFilter: userChangedFilter ? stateRef.current.libraryFilter : 'Watching',
                    searchInput: tab !== 'SEARCH' ? '' : stateRef.current.searchInput,
                    searchQuery: tab !== 'SEARCH' ? '' : stateRef.current.searchQuery,
                    fetchedShows: []
                });
            };

            const openDetails = (id, type) => {
                const numericId = typeof id === 'string' ? id.split('-')[0] : id;
                navigateToState({
                    selectedItem: { id: numericId, type },
                    selectedPerson: null
                });
            };

            const openPersonDetails = (personId) => {
                navigateToState({
                    selectedPerson: personId,
                    selectedItem: null
                });
            };

            const handleSearch = (e) => {
                if ((e.key === 'Enter' || e.type === 'click') && searchInput.trim()) {
                    navigateToState({
                        searchQuery: searchInput.trim(),
                        activeTab: 'SEARCH',
                        page: 1,
                        fetchedShows: [],
                        selectedItem: null,
                        selectedPerson: null
                    });
                }
            };

            // --- SUPABASE & FAVORITES LOGIC ---
            
            const repairMissingGenres = async (favList) => {
                const missing = favList.filter(f => !f.genres);
                if (missing.length === 0) return;

                for (const item of missing) {
                    try {
                        if (item.media_type && item.media_id) {
                            const url = `${TMDB_BASE_URL}/${item.media_type}/${item.media_id}?api_key=${TMDB_API_KEY}`;
                            const res = await fetch(url);
                            if (!res.ok) continue;
                            const data = await res.json();
                            const genresString = data.genres ? data.genres.map(g => g.name).join(', ') : 'Uncategorized';
                            
                            await supabase
                                .from('favorites')
                                .update({ genres: genresString })
                                .match({ media_id: item.media_id, media_type: item.media_type });
                        }
                    } catch (e) { console.error("Repair failed for item", item.media_id, e); }
                }
                fetchFavorites();
            };

            const fetchFavorites = async () => {
                setIsFavLoading(true);
                const { data, error } = await supabase
                    .from('favorites')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error("Error fetching favorites:", error);
                } else {
                    setFavorites(data || []);
                    const needsRepair = data?.some(f => !f.genres);
                    if (needsRepair) repairMissingGenres(data);
                }
                setIsFavLoading(false);
            };

            const toggleFavorite = async (item) => {
                if (isActionInProgress) return;
                setIsActionInProgress(true);

                const itemId = Number(item.id);
                const itemType = item.type;
                const isFav = isFavorited(itemId, itemType);

                if (isFav) {
                    const newFavorites = favorites.filter(fav => !(Number(fav.media_id) === itemId && fav.media_type === itemType));
                    setFavorites(newFavorites);

                    try {
                        const { error } = await supabase
                            .from('favorites')
                            .delete()
                            .match({ media_id: itemId, media_type: itemType });
                        if (error) throw error;
                    } catch (err) {
                        console.error("Error removing favorite:", err);
                    } finally {
                        setIsActionInProgress(false);
                        fetchFavorites();
                    }
                } else {
                    const genresString = item.genres ? item.genres.map(g => g.name).join(', ') : 'Uncategorized';
                    const payload = {
                        media_id: itemId,
                        media_type: itemType,
                        title: item.title,
                        poster_path: item.poster_path,
                        rating: item.vote_average?.toFixed(1) || 'N/A',
                        genres: genresString,
                        created_at: new Date().toISOString()
                    };

                    const newFavorites = [payload, ...favorites];
                    setFavorites(newFavorites);

                    try {
                        const { error } = await supabase
                            .from('favorites')
                            .insert([payload]);
                        if (error) throw error;
                    } catch (err) {
                        console.error("Error adding favorite:", err);
                    } finally {
                        setIsActionInProgress(false);
                        fetchFavorites();
                    }
                }
            };

            // --- TV TIME TRACKING LOGIC ---
            
            const fetchTracking = async () => {
                setIsTrackLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('tracking')
                        .select('*')
                        .order('updated_at', { ascending: false });
                    
                    if (error) throw error;
                    
                    setTrackedItems(data || []);
                    localStorage.setItem('moviegather_tracking', JSON.stringify(data || []));
                } catch (err) {
                    console.warn("Supabase tracking failed to fetch, loading locally:", err.message);
                    const localData = localStorage.getItem('moviegather_tracking');
                    if (localData) {
                        setTrackedItems(JSON.parse(localData));
                    } else {
                        setTrackedItems([]);
                    }
                } finally {
                    setIsTrackLoading(false);
                }
            };

            const handleTrackItem = async (item, status) => {
                if (isActionInProgress) return;
                setIsActionInProgress(true);

                const itemId = Number(item.id || item.media_id);
                const itemType = item.type || item.media_type;
                const title = item.title || item.name || detailsData?.title || detailsData?.name;
                const poster_path = item.poster_path || detailsData?.poster_path;
                const rating = (item.vote_average || item.rating || detailsData?.vote_average || 0);
                const ratingString = typeof rating === 'number' ? rating.toFixed(1) : String(rating);
                
                let genresString = 'Uncategorized';
                if (item.genres) {
                    genresString = Array.isArray(item.genres) ? item.genres.map(g => g.name).join(', ') : String(item.genres);
                } else if (detailsData?.genres) {
                    genresString = detailsData.genres.map(g => g.name).join(', ');
                }

                const existingItem = trackedItems.find(t => Number(t.media_id) === itemId && t.media_type === itemType);
                const progressPayload = existingItem?.progress || {};

                const trackingPayload = {
                    media_id: itemId,
                    media_type: itemType,
                    title,
                    poster_path,
                    rating: ratingString,
                    genres: genresString,
                    status,
                    progress: progressPayload,
                    updated_at: new Date().toISOString()
                };

                const newTrackedItems = [...trackedItems];
                const idx = newTrackedItems.findIndex(t => Number(t.media_id) === itemId && t.media_type === itemType);
                if (idx > -1) {
                    newTrackedItems[idx] = { ...newTrackedItems[idx], ...trackingPayload };
                } else {
                    newTrackedItems.unshift(trackingPayload);
                }
                setTrackedItems(newTrackedItems);
                localStorage.setItem('moviegather_tracking', JSON.stringify(newTrackedItems));

                try {
                    const { error } = await supabase
                        .from('tracking')
                        .upsert(trackingPayload, { onConflict: 'media_id,media_type' });
                    
                    if (error) throw error;
                } catch (error) {
                    console.error("Supabase tracking save error:", error.message);
                } finally {
                    setIsActionInProgress(false);
                    fetchTracking();
                }
            };

            const handleRemoveTracking = async (id, type) => {
                if (isActionInProgress) return;
                setIsActionInProgress(true);

                const itemId = Number(id);
                const itemType = type;

                const newTrackedItems = trackedItems.filter(t => !(Number(t.media_id) === itemId && t.media_type === itemType));
                setTrackedItems(newTrackedItems);
                localStorage.setItem('moviegather_tracking', JSON.stringify(newTrackedItems));

                try {
                    const { error } = await supabase
                        .from('tracking')
                        .delete()
                        .match({ media_id: itemId, media_type: itemType });
                    
                    if (error) throw error;
                } catch (error) {
                    console.error("Supabase tracking remove error:", error.message);
                } finally {
                    setIsActionInProgress(false);
                    fetchTracking();
                }
            };

            const getTrackingStatus = (id, type) => {
                const found = trackedItems.find(t => Number(t.media_id) === Number(id) && t.media_type === type);
                return found ? found.status : null;
            };

            const getTvProgress = (item) => {
                if (!item) return { watched_episodes: {}, watched_count: 0, total_episodes: 0, percentage: 0 };
                let prog = {};
                if (item.progress) {
                    prog = typeof item.progress === 'string' ? JSON.parse(item.progress) : item.progress;
                }
                const watched_episodes = prog?.watched_episodes || {};
                const watched_count = Object.keys(watched_episodes).filter(k => watched_episodes[k] === true).length;
                const total_episodes = prog?.total_episodes || 0;
                const percentage = total_episodes > 0 ? Math.round((watched_count / total_episodes) * 100) : 0;
                return {
                    watched_episodes,
                    watched_count,
                    total_episodes,
                    percentage
                };
            };

            const updateTvProgress = async (mediaId, newWatchedEpisodes, totalCount) => {
                if (isActionInProgress) return;
                setIsActionInProgress(true);

                const numericId = Number(mediaId);
                const foundItem = trackedItems.find(t => Number(t.media_id) === numericId && t.media_type === 'tv');
                const watchedCount = Object.keys(newWatchedEpisodes).filter(k => newWatchedEpisodes[k] === true).length;

                const progressPayload = {
                    watched_episodes: newWatchedEpisodes,
                    total_episodes: totalCount,
                    watched_count: watchedCount
                };

                let targetStatus = foundItem ? foundItem.status : 'Watching';
                if (totalCount > 0) {
                    if (watchedCount === totalCount) {
                        targetStatus = 'Watched';
                    } else if (targetStatus === 'Watched' && watchedCount < totalCount) {
                        targetStatus = 'Watching';
                    }
                }

                const payload = {
                    media_id: numericId,
                    media_type: 'tv',
                    title: detailsData?.name || foundItem?.title || 'Unknown',
                    poster_path: detailsData?.poster_path || foundItem?.poster_path || '',
                    rating: (detailsData?.vote_average || Number(foundItem?.rating) || 0).toFixed(1),
                    genres: detailsData?.genres ? detailsData.genres.map(g => g.name).join(', ') : (foundItem?.genres || 'Uncategorized'),
                    status: targetStatus,
                    progress: progressPayload,
                    updated_at: new Date().toISOString()
                };

                const newTrackedItems = [...trackedItems];
                const idx = newTrackedItems.findIndex(t => Number(t.media_id) === numericId && t.media_type === 'tv');
                if (idx > -1) {
                    newTrackedItems[idx] = { ...newTrackedItems[idx], ...payload };
                } else {
                    newTrackedItems.unshift(payload);
                }
                setTrackedItems(newTrackedItems);
                localStorage.setItem('moviegather_tracking', JSON.stringify(newTrackedItems));

                try {
                    const { error } = await supabase
                        .from('tracking')
                        .upsert(payload, { onConflict: 'media_id,media_type' });
                    if (error) throw error;
                } catch (error) {
                    console.error("Failed to save TV progress to Supabase:", error.message);
                } finally {
                    setIsActionInProgress(false);
                    fetchTracking();
                }
            };

            useEffect(() => {
                fetchFavorites();
                fetchTracking();
            }, []);

            useEffect(() => {
                if (activeTab === 'FAVORITES') fetchFavorites();
                if (activeTab === 'LIBRARY') fetchTracking();
            }, [activeTab]);

            // Track menu outside clicks - changed to click listener instead of mousedown to avoid race-condition blocks on mobile taps
            useEffect(() => {
                const handleOutsideClick = (e) => {
                    if (isTrackMenuOpen && !e.target.closest('.track-menu-container')) {
                        setIsTrackMenuOpen(false);
                    }
                };
                document.addEventListener('click', handleOutsideClick);

            }, [isTrackMenuOpen]);

            useEffect(() => {
                setExpandedSeasons({});
                setSeasonEpisodesMap({});
            }, [selectedItem]);

            const availableFavGenres = useMemo(() => {
                const genresSet = new Set(['All']);
                favorites.forEach(fav => {
                    if (fav.genres) {

                });
                return Array.from(genresSet).sort((a, b) => a === 'All' ? -1 : a.localeCompare(b));
            }, [favorites]);

            const filteredFavorites = useMemo(() => {
                return favorites.filter(fav => {
                    const typeMatch = favFilter === 'all' || fav.media_type === favFilter;
                    const genreMatch = favGenreFilter === 'All' || (fav.genres && fav.genres.includes(favGenreFilter));
                    return typeMatch && genreMatch;
                });
            }, [favorites, favFilter, favGenreFilter]);

            const availableTrackedGenres = useMemo(() => {
                const genresSet = new Set(['All']);
                trackedItems.forEach(item => {
                    if (item.genres) {
                        item.genres.split(', ').forEach(g => genresSet.add(g));
                    }
                });
                return Array.from(genresSet).sort((a, b) => a === 'All' ? -1 : a.localeCompare(b));
            }, [trackedItems]);

            const filteredLibraryItems = useMemo(() => {
                return trackedItems.filter(item => {
                    const typeMatch = libraryTypeFilter === 'All' || item.media_type === libraryTypeFilter;
                    const statusMatch = libraryFilter === 'All' || item.status === libraryFilter;
                    const genreMatch = libraryGenreFilter === 'All' || (item.genres && item.genres.includes(libraryGenreFilter));
                    return typeMatch && statusMatch && genreMatch;
                });
            }, [trackedItems, libraryFilter, libraryTypeFilter, libraryGenreFilter]);

            useEffect(() => {
                if (activeTab === 'BOARD' && comingSoonItems.length > 0 && !selectedItem && !selectedPerson) {
                    const timer = setInterval(() => {
                        setCurrentHeroIndex(prev => (prev + 1) % comingSoonItems.length);

            }, [activeTab, comingSoonItems.length, selectedItem, selectedPerson]);

            useEffect(() => {

                    if (window.innerHeight + document.documentElement.scrollTop + 100 >= document.documentElement.offsetHeight) {
                        if (!isLoading && (['MOVIES', 'SERIES', 'NEW', 'SEARCH'].includes(activeTab))) {
                            setPage((prevPage) => prevPage + 1);
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [isLoading, activeTab, selectedItem, selectedPerson]);

            useEffect(() => {
                if (!selectedItem) {
                    setDetailsData(null);
                    setIsTrackMenuOpen(false);
                    return;
                }
                const fetchDetails = async () => {
                    setIsDetailsLoading(true);
                    try {
                        if (selectedItem && selectedItem.type && selectedItem.id) {
                            const url = `${TMDB_BASE_URL}/${selectedItem.type}/${selectedItem.id}?api_key=${TMDB_API_KEY}&append_to_response=credits,videos`;
                            const res = await fetch(url);
                            const data = await res.json();
                            setDetailsData(data);
                        }
                    } catch (err) { console.error(err); } finally { setIsDetailsLoading(false); }
                };
                fetchDetails();
            }, [selectedItem]);

            useEffect(() => {
                if (!selectedPerson) {
                    setPersonData(null);
                    return;
                }
                const fetchPerson = async () => {
                    setIsPersonLoading(true);
                    try {
                        if (selectedPerson) {
                            const url = `${TMDB_BASE_URL}/person/${selectedPerson}?api_key=${TMDB_API_KEY}&append_to_response=combined_credits`;
                            const res = await fetch(url);
                            const data = await res.json();
                            setPersonData(data);
                        }
                    } catch (err) { console.error(err); } finally { setIsPersonLoading(false); }
                };
                fetchPerson();
            }, [selectedPerson]);

            useEffect(() => {
                if (activeTab !== 'BOARD') return;

                const genreMap = {
                    'Action': { m: 28, t: 10759 },
                    'Comedy': { m: 35, t: 35 },
                    'Historical': { m: 36, t: null },
                    'Drama': { m: 18, t: 18 },
                    'Sci fi': { m: 878, t: 10765 },
                    'Fantasy': { m: 14, t: 10765 },
                    'Musical': { m: 10402, t: null },
                    'Documentary': { m: 99, t: 99 },
                };

                const fetchBoardData = async () => {
                    setIsTrendingLoading(true);
                    setIsBoardNewLoading(true);
                    setIsSectionsLoading(true);
                    
                    try {
                        let trendingUrl = boardGenre && genreMap[boardGenre] && genreMap[boardGenre].m
                            ? `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${genreMap[boardGenre].m}&sort_by=popularity.desc`
                            : `${TMDB_BASE_URL}/trending/all/week?api_key=${TMDB_API_KEY}`;
                        
                        const today = new Date().toISOString().split('T')[0];
                        let newUrl = `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&sort_by=primary_release_date.desc&primary_release_date.lte=${today}&vote_count.gte=5&with_origin_country=US`;
                        if (boardGenre && genreMap[boardGenre] && genreMap[boardGenre].m) newUrl += `&with_genres=${genreMap[boardGenre].m}`;

                        let popMovieUrl = boardGenre && genreMap[boardGenre] && genreMap[boardGenre].m
                            ? `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${genreMap[boardGenre].m}&sort_by=popularity.desc`
                            : `${TMDB_BASE_URL}/movie/popular?api_key=${TMDB_API_KEY}&language=en-US&page=1`;

                        let popTvUrl = boardGenre && genreMap[boardGenre] && genreMap[boardGenre].t
                            ? `${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=${genreMap[boardGenre].t}&sort_by=popularity.desc`
                            : `${TMDB_BASE_URL}/tv/popular?api_key=${TMDB_API_KEY}&language=en-US&page=1`;

                        let topRatedUrl = boardGenre && genreMap[boardGenre] && genreMap[boardGenre].m
                            ? `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${genreMap[boardGenre].m}&sort_by=vote_average.desc&vote_count.gte=1000`
                            : `${TMDB_BASE_URL}/movie/top_rated?api_key=${TMDB_API_KEY}&language=en-US&page=1`;

                        const [trendRes, newRes, popMRes, popTvRes, topRes] = await Promise.all([
                            fetch(trendingUrl), fetch(newUrl), fetch(popMovieUrl), fetch(popTvUrl), fetch(topRatedUrl)
                        ]);

                        const mapper = (i, type) => ({
                            id: i.id, 
                            type: type || i.media_type || (i.name ? 'tv' : 'movie'), 
                            title: i.title || i.name, 
                            rating: i.vote_average?.toFixed(1) || 'N/A',
