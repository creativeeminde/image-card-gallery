                            image: `https://image.tmdb.org/t/p/w500${i.poster_path}`
                        });

                        const [tD, nD, pMD, pTD, trD] = await Promise.all([trendRes.json(), newRes.json(), popMRes.json(), popTvRes.json(), topRes.json()]);

                        setTrendingItems(tD.results?.filter(i => i.poster_path).slice(0, 15).map(i => mapper(i)) || []);
                        setBoardNewItems(nD.results?.filter(i => i.poster_path).slice(0, 15).map(i => mapper(i, 'movie')) || []);
                        setPopularMovies(pMD.results?.filter(i => i.poster_path).slice(0, 15).map(i => mapper(i, 'movie')) || []);
                        setPopularTV(pTD.results?.filter(i => i.poster_path).slice(0, 15).map(i => mapper(i, 'tv')) || []);
                        setTopRated(trD.results?.filter(i => i.poster_path).slice(0, 15).map(i => mapper(i, 'movie')) || []);

                    } catch (err) { console.error(err); } finally { 
                        setIsTrendingLoading(false); setIsBoardNewLoading(false); setIsSectionsLoading(false);
                    }
                };

                const fetchComingSoon = async () => {
                    setIsComingSoonLoading(true);
                    try {
                        const today = new Date().toISOString().split('T')[0];
                        const url = `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&primary_release_date.gte=${today}&with_origin_country=US`;
                        const res = await fetch(url);
                        const data = await res.json();
                        setComingSoonItems(data.results.filter(i => i.poster_path).slice(0, 15).map(i => ({
                            id: i.id, type: 'movie', title: i.title, rating: i.vote_average?.toFixed(1) || 'N/A', viewers: Math.floor(Math.random()*500), comments: Math.floor(Math.random()*100),
                            image: `https://image.tmdb.org/t/p/w500${i.poster_path}`,
                            heroImage: `https://image.tmdb.org/t/p/original${i.backdrop_path || i.poster_path}`,
                            dateFormatted: new Date(i.release_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                        })));
                    } catch (err) { console.error(err); } finally { setIsComingSoonLoading(false); }
                };

                fetchBoardData(); fetchComingSoon();
            }, [activeTab, boardGenre]);

            useEffect(() => {
                if (activeTab === 'BOARD' || selectedItem || selectedPerson || activeTab === 'FAVORITES' || activeTab === 'LIBRARY') return;

                const fetchDynamicData = async () => {
                    setIsLoading(true);
                    try {
                        let newItems = [];
                        const effectivePage = page + randomPageOffset;

                        if (activeTab === 'NEW') {
                            const currentYear = new Date().getFullYear();
                            const dateGte = `${currentYear}-01-01`;
                            const dateLte = new Date().toISOString().split('T')[0];

                            const movieUrl = `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&sort_by=primary_release_date.desc&page=${page}&primary_release_date.gte=${dateGte}&primary_release_date.lte=${dateLte}&with_origin_country=US`;
                            const tvUrl = `${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&sort_by=first_air_date.desc&page=${page}&first_air_date.gte=${dateGte}&first_air_date.lte=${dateLte}&with_origin_country=US`;

                            const [mRes, tRes] = await Promise.all([fetch(movieUrl), fetch(tvUrl)]);
                            const mData = await mRes.json();
                            const tData = await tRes.json();

                            const combined = [
                                ...(mData.results || []),
                                ...(tData.results || [])
                            ].filter(i => i.poster_path)
                             .sort((a, b) => new Date(b.release_date || b.first_air_date) - new Date(a.release_date || a.first_air_date))
                             .slice(0, 10); 

                            newItems = combined.map(i => ({
                                id: `${i.id}-${page}`, 
                                type: i.name ? 'tv' : 'movie', 
                                name: i.title || i.name, 
                                rating: { average: i.vote_average?.toFixed(1) || 'N/A' }, 
                                image: { medium: `https://image.tmdb.org/t/p/w500${i.poster_path}` }
                            }));
                        } else {
                            let url = '';
                            if (activeTab === 'MOVIES') {
                                url = `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&page=${effectivePage}`;
                                if (filterYear) url += `&primary_release_year=${filterYear}`;
                                if (filterGenre) url += `&with_genres=${GENRE_MAP_MOVIE[filterGenre]}`;
                                if (filterCountry) url += `&with_origin_country=${COUNTRY_MAP[filterCountry]}`;
                            } else if (activeTab === 'SERIES') {
                                url = `${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&page=${effectivePage}`;
                                if (filterYear) url += `&first_air_date_year=${filterYear}`;
                                if (filterGenre) url += `&with_genres=${GENRE_MAP_TV[filterGenre]}`;
                                if (filterCountry) url += `&with_origin_country=${COUNTRY_MAP[filterCountry]}`;
                            } else if (activeTab === 'SEARCH') {
                                url = `${TMDB_BASE_URL}/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(searchQuery)}&page=${page}`;
                            }

                            if (url) {
                                const res = await fetch(url);
                                const data = await res.json();
                                newItems = (data.results || []).filter(i => i.poster_path && i.media_type !== 'person').map(i => ({
                                    id: `${i.id}-${page}`, type: i.media_type || (i.name ? 'tv' : 'movie'), name: i.title || i.name, rating: { average: i.vote_average?.toFixed(1) || 'N/A' }, image: { medium: `https://image.tmdb.org/t/p/w500${i.poster_path}` }
                                }));
                            }

                            if (newItems.length === 0 && effectivePage > 1 && page === 1) {
                                setRandomPageOffset(0);
                                return;
                            }
                        }

                        setFetchedShows(prev => page === 1 ? newItems : [...prev, ...newItems]);
                    } catch (err) { console.error(err); } finally { setIsLoading(false); }
                };
                fetchDynamicData();
            }, [activeTab, page, filterYear, filterGenre, filterCountry, searchQuery, selectedItem, selectedPerson, randomPageOffset, filterTimeframe]);

            const scrollCast = (direction) => {
                if (castScrollRef.current) {
                    const scrollAmount = direction === 'left' ? -300 : 300;
                    castScrollRef.current.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
            };

            const isFavorited = (id, type) => favorites.some(fav => Number(fav.media_id) === Number(id) && fav.media_type === type);

            const sortedActorCredits = useMemo(() => {
                if (!personData || !personData.combined_credits || !personData.combined_credits.cast) return [];
                
                // Keep only valid movies and TV shows
                const baseCast = personData.combined_credits.cast.filter(item => {
                    const excludedGenres = [10767, 10763, 10764];
                    const characterName = (item.character || "").toLowerCase();
                    return item.poster_path && 
                           !item.genre_ids?.some(id => excludedGenres.includes(id)) && 
                           !characterName.includes("self") && 
                           !characterName.includes("himself") && 
                           !characterName.includes("herself");
                });

                if (actorSort === 'popularity') {
                    return [...baseCast].sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
                }

                return [...baseCast].sort((a, b) => {
                    const dateAStr = a.release_date || a.first_air_date || '';
                    const dateBStr = b.release_date || b.first_air_date || '';
                    
                    if (!dateAStr) return actorSort === 'newest' ? 1 : -1;
                    if (!dateBStr) return actorSort === 'newest' ? -1 : 1;
                    
                    const timeA = new Date(dateAStr).getTime();
                    const timeB = new Date(dateBStr).getTime();
                    
                    return actorSort === 'newest' ? (timeB - timeA) : (timeA - timeB);
                });
            }, [personData, actorSort]);

            const { 
                tvTotalEpisodes, 
                tvWatchedEpisodes, 
                tvWatchedCount, 
                tvProgressPercent, 
                tvNextEpisode 
            } = useMemo(() => {
                if (!detailsData || selectedItem?.type !== 'tv') {
                    return { tvTotalEpisodes: 0, tvWatchedEpisodes: {}, tvWatchedCount: 0, tvProgressPercent: 0, tvNextEpisode: 'N/A' };
                }
                const regularSeasons = detailsData.seasons?.filter(s => s.season_number > 0) || [];
                const totalEpisodes = regularSeasons.reduce((acc, s) => acc + (s.episode_count || 0), 0);
                
                const trackedItem = trackedItems.find(t => Number(t.media_id) === Number(selectedItem.id) && t.media_type === 'tv');
                const { watched_episodes } = getTvProgress(trackedItem);

                let nextEpStr = 'All Caught Up!';
                let foundNext = false;
                const sortedSeasons = [...regularSeasons].sort((a, b) => a.season_number - b.season_number);
                for (const s of sortedSeasons) {
                    for (let ep = 1; ep <= s.episode_count; ep++) {
                        const key = `${s.season_number}_${ep}`;
                        if (!watched_episodes[key]) {
                            nextEpStr = `S${String(s.season_number).padStart(2, '0')}E${String(ep).padStart(2, '0')}`;
                            foundNext = true;
                            break;
                        }
                    }
                    if (foundNext) break;
                }

                const watchedCount = Object.keys(watched_episodes).filter(k => watched_episodes[k] === true).length;
                const progressPercent = totalEpisodes > 0 ? Math.round((watchedCount / totalEpisodes) * 100) : 0;

                return {
                    tvTotalEpisodes: totalEpisodes,
                    tvWatchedEpisodes: watched_episodes,
                    tvWatchedCount: watchedCount,
                    tvProgressPercent: progressPercent,
                    tvNextEpisode: nextEpStr
                };
            }, [detailsData, selectedItem, trackedItems]);

            const toggleSeasonExpand = async (seasonNum) => {
                const isOpening = !expandedSeasons[seasonNum];
                setExpandedSeasons(prev => ({ ...prev, [seasonNum]: isOpening }));
                
                if (isOpening && !seasonEpisodesMap[seasonNum]) {
                    try {
                        const url = `${TMDB_BASE_URL}/tv/${selectedItem.id}/season/${seasonNum}?api_key=${TMDB_API_KEY}`;
                        const res = await fetch(url);
                        if (res.ok) {
                            const data = await res.json();
                            setSeasonEpisodesMap(prev => ({ ...prev, [seasonNum]: data.episodes || [] }));
                        }
                    } catch (e) {
                        console.error("Failed to fetch season episodes", e);
                    }
                }
            };

            const toggleEpisodeWatched = (seasonNum, episodeNum) => {
                const epKey = `${seasonNum}_${episodeNum}`;
                const updatedWatched = { ...tvWatchedEpisodes };
                updatedWatched[epKey] = !updatedWatched[epKey];
                updateTvProgress(selectedItem.id, updatedWatched, tvTotalEpisodes);
            };

            const markSeasonWatched = (seasonNum, episodeCount, forceValue = true) => {
                const updatedWatched = { ...tvWatchedEpisodes };
                for (let ep = 1; ep <= episodeCount; ep++) {
                    const epKey = `${seasonNum}_${ep}`;
                    if (forceValue) {
                        updatedWatched[epKey] = true;
                    } else {
                        delete updatedWatched[epKey];
                    }
                }
                updateTvProgress(selectedItem.id, updatedWatched, tvTotalEpisodes);
            };

            const markAllWatched = (forceValue = true) => {
                const updatedWatched = forceValue ? { ...tvWatchedEpisodes } : {};
                if (forceValue && detailsData?.seasons) {
                    const regularSeasons = detailsData.seasons.filter(s => s.season_number > 0);
                    regularSeasons.forEach(s => {
                        for (let ep = 1; ep <= s.episode_count; ep++) {
                            updatedWatched[`${s.season_number}_${ep}`] = true;
                        }
                    });
                }
                updateTvProgress(selectedItem.id, updatedWatched, tvTotalEpisodes);
            };

            return (
                <div className="min-h-screen pb-20 overflow-x-hidden">
                    {/* Responsive Header */}
                    <header className="sticky top-0 z-[100] flex h-auto md:h-20 flex-col md:flex-row items-center justify-between px-4 md:px-8 py-3 md:py-0 bg-white/40 backdrop-blur-md border-b border-white/20">
                        <div className="flex w-full md:w-auto items-center justify-between mb-4 md:mb-0">
                            <div className="flex flex-col items-center justify-center pt-1 cursor-pointer" onClick={() => handleTabChange('BOARD')}>
                                <span className="text-xs md:text-sm font-black tracking-[0.3em] leading-none">M O V I E</span>
                                <span className="text-[8px] md:text-[10px] font-bold tracking-[0.15em] leading-tight text-gray-800">G A T H E R</span>
                            </div>
                            <div onClick={() => handleTabChange('FAVORITES')} className="relative cursor-pointer md:hidden flex items-center gap-2">
                                <div className="h-9 w-9 rounded-xl bg-black flex items-center justify-center border-2 border-white shadow-sm transition-transform">
                                    <span className="text-white font-black text-base select-none">M</span>
                                </div>
                                {favorites.length > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-4 h-4 flex items-center justify-center rounded-full border border-white shadow-sm">
                                        {favorites.length}
                                    </span>
                                )}
                            </div>
                        </div>

                        <nav className="flex w-full md:w-auto space-x-4 md:space-x-10 overflow-x-auto no-scrollbar md:overflow-visible pb-2 md:pb-0 justify-center">
                            {['BOARD', 'NEW', 'MOVIES', 'SERIES', 'LIBRARY'].map((tab) => (
                                <button key={tab} onClick={() => handleTabChange(tab)} className={`relative py-1 md:py-2 text-[10px] md:text-xs font-extrabold tracking-widest uppercase transition-colors shrink-0 ${activeTab === tab ? 'text-black' : 'text-gray-500 hover:text-black'}`}>
                                    {tab}{activeTab === tab && <div className="absolute bottom-0 left-0 right-0 h-[2px] md:h-[3px] bg-black rounded-t-sm" />}
                                </button>

                                                                                                    <div className="flex-1 min-w-0 pt-0.5">
                                                                                                        <div className="flex flex-wrap items-center gap-2 mb-1">
                                                                                                            <span className="text-[9px] font-black px-2 py-0.5 rounded-md bg-blue-50 text-blue-600 border border-blue-100 uppercase tracking-wider">
                                                                                                                EP {episode.episode_number}
                                                                                                            </span>
                                                                                                            <span className="text-[10px] text-gray-400 font-bold">
                                                                                                                {episode.air_date ? new Date(episode.air_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'No Air Date'}
                                                                                                            </span>
                                                                                                        </div>
                                                                                                        <h4 className="text-sm font-bold text-gray-900 mb-1.5 leading-snug truncate">
                                                                                                            {episode.name || 'Untitled Episode'}
                                                                                                        </h4>
                                                                                                        {episode.overview ? (
                                                                                                            <p className="text-xs text-gray-500 leading-relaxed line-clamp-2 md:line-clamp-3">
                                                                                                                {episode.overview}
                                                                                                            </p>
                                                                                                        ) : (
                                                                                                            <p className="text-xs text-gray-400 italic">No description available for this episode.</p>
                                                                                                        )}
                                                                                                    </div>
                                                                                                </div>
                                                                                                
                                                                                                <div className="flex items-center sm:self-end md:self-center shrink-0 pt-2 sm:pt-0 w-full md:w-auto">
                                                                                                    <button 
                                                                                                        onClick={() => toggleEpisodeWatched(season.season_number, episode.episode_number)}
                                                                                                        className={`w-full md:w-auto px-5 py-2.5 rounded-xl border flex items-center justify-center gap-2 text-xs font-black transition-all shadow-xs active:scale-95 ${
                                                                                                            isWatched 
                                                                                                            ? 'bg-green-600 border-green-600 text-white hover:bg-green-700 shadow-sm' 
                                                                                                            : 'bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300'
                                                                                                        }`}
                                                                                                    >
                                                                                                        <Icon name={isWatched ? 'Check' : 'Plus'} className="h-4 w-4 stroke-[2.5]" />
                                                                                                        <span>{isWatched ? 'Watched' : 'Mark Watched'}</span>
                                                                                                    </button>
                                                                                                </div>
                                                                                            </div>
                                                                                        );
                                                                                    })
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                )}

                                                <div className="flex items-center justify-between mb-6">
                                                    <h2 className="text-xl md:text-2xl font-black">Top Cast</h2>
                                                    <div className="flex space-x-2">
                                                        <button onClick={() => scrollCast('left')} className="flex h-8 w-8 items-center justify-center rounded-full border border-gray-300 bg-white shadow-sm"><Icon name="ChevronLeft" /></button>
                                                        <button onClick={() => scrollCast('right')} className="flex h-8 w-8 items-center justify-center rounded-full border border-gray-300 bg-white shadow-sm"><Icon name="ChevronRight" /></button>
                                                    </div>
                                                </div>
                                                <div ref={castScrollRef} className="flex gap-4 md:gap-6 overflow-x-auto no-scrollbar pb-4 scroll-smooth">
                                                    {detailsData.credits?.cast?.map(person => (
                                                        <div key={person.id} onClick={() => openPersonDetails(person.id)} className="w-24 md:w-32 flex-shrink-0 text-center group pointer-events-auto cursor-pointer">
                                                            <img src={person.profile_path ? `https://image.tmdb.org/t/p/w185${person.profile_path}` : 'https://via.placeholder.com/185'} className="h-24 w-24 md:h-32 md:w-32 rounded-full object-cover mb-3 mx-auto border-2 border-white shadow-sm group-hover:scale-110 transition-transform" />
                                                            <p className="text-[10px] md:text-xs font-black line-clamp-1">{person.name}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === 'FAVORITES' ? (
                            <div className="animate-in fade-in duration-500">
                                <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 md:mb-8 gap-4">
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-black mb-1 md:mb-2 flex items-center gap-3">
                                            Favorites
                                            <span className="text-[10px] md:text-sm font-bold bg-white px-2 py-0.5 md:px-3 md:py-1 rounded-full shadow-sm text-gray-500 border border-gray-100">
                                                {favorites.length}
                                            </span>
                                        </h1>
                                    </div>
                                    <div className="flex gap-1.5 glass p-1 rounded-full border border-white shadow-sm self-start md:self-auto">
                                        {['all', 'movie', 'tv'].map(type => (
                                            <button 
                                                key={type} 
                                                onClick={() => navigateToState({ favFilter: type, favGenreFilter: 'All' })} 
                                                className={`px-3 md:px-6 py-1 md:py-2 rounded-full font-bold text-[10px] md:text-xs transition-all uppercase tracking-wider ${favFilter === type ? 'bg-black text-white shadow-md' : 'text-gray-500 hover:text-black'}`}
                                            >
                                                {type === 'all' ? 'All' : type === 'movie' ? 'Movies' : 'TV'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {favorites.length > 0 && (
                                    <div className="mb-8">
                                        <div className="flex items-center gap-3 overflow-x-auto no-scrollbar py-2 scroll-smooth">
                                            {availableFavGenres.map(genre => (
                                                <button 
                                                    key={genre}
                                                    onClick={() => navigateToState({ favGenreFilter: genre })}
                                                    className={`shrink-0 px-4 md:px-6 py-2 rounded-full text-[10px] md:text-xs font-black transition-all border shadow-sm ${favGenreFilter === genre ? 'bg-black text-white border-black scale-105' : 'bg-white text-gray-900 border-gray-100 hover:bg-white'}`}
                                                >
                                                    {genre}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {isFavLoading ? (
                                    <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-gray-300 border-t-black rounded-full animate-spin"></div></div>
                                ) : favorites.length === 0 ? (
                                    <div className="py-20 md:py-32 text-center glass rounded-[2rem] md:rounded-[3rem] border-2 border-dashed border-gray-300">
                                        <Icon name="Heart" className="h-12 w-12 md:h-16 md:w-16 mx-auto mb-6 text-gray-300" />
                                        <p className="text-lg md:text-xl font-bold text-gray-400">Empty collection.</p>
                                        <button onClick={() => handleTabChange('BOARD')} className="mt-4 md:mt-6 px-6 md:px-8 py-2 md:py-3 bg-black text-white rounded-full font-bold hover:scale-105 transition-transform shadow-lg">Start Exploring</button>
                                    </div>
                                ) : (
                                    <>
                                        {filteredFavorites.length === 0 ? (
                                            <div className="py-20 text-center font-bold text-gray-400">No matches found.</div>
                                        ) : (
                                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-4 md:gap-6">
                                                {filteredFavorites.map(fav => (
                                                    <div key={fav.id} onClick={() => openDetails(fav.media_id, fav.media_type)} className="cursor-pointer group animate-in zoom-in-95 duration-300">
                                                        <div className="aspect-[2/3] rounded-2xl overflow-hidden shadow-sm mb-2 relative border-2 border-transparent hover:border-white transition-all">
                                                            <img src={`https://image.tmdb.org/t/p/w500${fav.poster_path}`} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                                            <div className="absolute top-2 right-2 p-1.5 md:p-2 rounded-full bg-black/40 backdrop-blur-md opacity-100">
                                                                <Icon name="Heart" className="h-3 w-3 md:h-4 md:w-4 fill-red-500 text-red-500" />
                                                            </div>
                                                        </div>
                                                        <p className="text-[9px] md:text-[11px] font-bold text-gray-500 mb-1">★ {fav.rating} TMDb</p>
                                                        <h3 className="text-xs md:text-sm font-bold truncate group-hover:text-black transition-colors">{fav.title}</h3>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        ) : activeTab === 'LIBRARY' ? (
                            <div className="animate-in fade-in duration-500">
                                <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 md:mb-8 gap-4">
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-black mb-1 md:mb-2 flex items-center gap-3">
                                            My Library
                                            <span className="text-[10px] md:text-sm font-bold bg-white px-2 py-0.5 md:px-3 md:py-1 rounded-full shadow-sm text-gray-500 border border-gray-100">
                                                {trackedItems.length}
                                            </span>
                                        </h1>
                                    </div>
                                    <div className="flex gap-1.5 glass p-1 rounded-full border border-white shadow-sm self-start md:self-auto">
                                        {['All', 'movie', 'tv'].map(type => (
                                            <button 
                                                key={type} 
                                                onClick={() => navigateToState({ libraryTypeFilter: type, libraryGenreFilter: 'All' })} 
                                                className={`px-3 md:px-6 py-1 md:py-2 rounded-full font-bold text-[10px] md:text-xs transition-all uppercase tracking-wider ${libraryTypeFilter === type ? 'bg-black text-white shadow-md' : 'text-gray-500 hover:text-black'}`}
                                            >
                                                {type === 'All' ? 'All' : type === 'movie' ? 'Movies' : 'TV'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {trackedItems.length > 0 && (
                                    <div className="mb-6 overflow-x-auto no-scrollbar py-2">
                                        <div className="flex gap-2">
                                            {['All', 'Watching', 'Watched', 'Plan to Watch', 'On Hold', 'Dropped'].map(status => (
                                                <button
                                                    key={status}
                                                    onClick={() => {
                                                        setUserChangedFilter(true);
                                                        navigateToState({ libraryFilter: status });
                                                    }}
                                                    className={`shrink-0 px-4 py-2 rounded-full text-[10px] md:text-xs font-black transition-all border shadow-sm ${
                                                        libraryFilter === status 
                                                        ? 'bg-black text-white border-black scale-105' 
                                                        : 'bg-white text-gray-900 border-gray-100 hover:bg-white'
                                                    }`}
                                                >
                                                    {status}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {trackedItems.length > 0 && (
                                    <div className="mb-8">
                                        <div className="flex items-center gap-3 overflow-x-auto no-scrollbar py-2 scroll-smooth">
                                            {availableTrackedGenres.map(genre => (
                                                <button 
                                                    key={genre}
                                                    onClick={() => navigateToState({ libraryGenreFilter: genre })}
                                                    className={`shrink-0 px-4 md:px-6 py-2 rounded-full text-[10px] md:text-xs font-black transition-all border shadow-sm ${libraryGenreFilter === genre ? 'bg-black text-white border-black scale-105' : 'bg-white text-gray-900 border-gray-100 hover:bg-white'}`}
                                                >
                                                    {genre}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {isTrackLoading ? (
                                    <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-gray-300 border-t-black rounded-full animate-spin"></div></div>
                                ) : trackedItems.length === 0 ? (
                                    <div className="py-20 md:py-32 text-center glass rounded-[2rem] md:rounded-[3rem] border-2 border-dashed border-gray-300">
                                        <Icon name="PlusCircle" className="h-12 w-12 md:h-16 md:w-16 mx-auto mb-6 text-gray-300" />
                                        <p className="text-lg md:text-xl font-bold text-gray-400">Your library is empty.</p>
                                        <p className="text-xs md:text-sm text-gray-400 mt-1 max-w-sm mx-auto px-4">Track shows as 'Watching', 'Watched', or 'Plan to Watch' to start compiling your collection!</p>
                                        <button onClick={() => handleTabChange('BOARD')} className="mt-6 px-6 md:px-8 py-2 md:py-3 bg-black text-white rounded-full font-bold hover:scale-105 transition-transform shadow-lg">Start Exploring</button>
                                    </div>
                                ) : (
                                    <>
                                        {filteredLibraryItems.length === 0 ? (
                                            <div className="py-20 text-center font-bold text-gray-400">No tracked items matches.</div>
                                        ) : (
                                            <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                                                {filteredLibraryItems.map(item => {
                                                    if (item.media_type === 'tv') {
                                                        return (
                                                            <LibraryTvCard 
                                                                key={`${item.media_id}-${item.media_type}`} 
                                                                item={item} 
                                                                openDetails={openDetails} 
                                                                handleRemoveTracking={handleRemoveTracking} 
                                                                handleTrackItem={handleTrackItem}
                                                                updateTvProgress={updateTvProgress}
                                                            />
                                                        );
                                                    } else {
                                                        return (
                                                            <LibraryMovieCard 
                                                                key={`${item.media_id}-${item.media_type}`} 
                                                                item={item} 
                                                                openDetails={openDetails} 
                                                                handleRemoveTracking={handleRemoveTracking} 
                                                                handleTrackItem={handleTrackItem}
                                                            />
                                                        );
                                                    }
                                                })}
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        ) : activeTab === 'BOARD' ? (
                            <>
                                <div className="flex flex-col lg:flex-row gap-6 md:gap-8 mb-8 lg:h-[400px]">
                                    <div className="group relative w-full lg:flex-1 h-[300px] md:h-[400px] lg:h-full overflow-hidden rounded-[2rem] md:rounded-[2.5rem] shadow-xl shadow-gray-300/50 bg-black">
                                        {comingSoonItems.length > 0 ? (
                                            <div className="relative h-full w-full">
                                                <img 
                                                    key={comingSoonItems[currentHeroIndex].id}
                                                    src={comingSoonItems[currentHeroIndex].heroImage} 
                                                    className="absolute inset-0 w-full h-full object-cover opacity-80" 
                                                />
                                                <div className="absolute inset-0 bg-gradient-to-r from-black/90 to-transparent"></div>
                                                <div className="absolute inset-x-4 top-1/2 flex -translate-y-1/2 justify-between z-20 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={(e) => { e.stopPropagation(); setCurrentHeroIndex(p => p === 0 ? comingSoonItems.length - 1 : p - 1); }} className="flex h-10 w-10 md:h-12 md:w-12 items-center justify-center rounded-full bg-black/30 text-white backdrop-blur-md border border-white/20"><Icon name="ChevronLeft" /></button>
                                                    <button onClick={(e) => { e.stopPropagation(); setCurrentHeroIndex(p => (p + 1) % comingSoonItems.length); }} className="flex h-10 w-10 md:h-12 md:w-12 items-center justify-center rounded-full bg-black/30 text-white backdrop-blur-md border border-white/20"><Icon name="ChevronRight" /></button>
                                                </div>
                                                <div className="absolute bottom-6 md:bottom-12 left-6 md:left-12 text-white z-20 cursor-pointer pr-6" onClick={() => openDetails(comingSoonItems[currentHeroIndex].id, 'movie')}>
                                                    <p className="text-[8px] md:text-xs font-bold mb-2 md:mb-3 uppercase tracking-widest bg-white/10 w-max px-2 py-0.5 md:px-3 md:py-1 rounded-full">Releasing {comingSoonItems[currentHeroIndex].dateFormatted}</p>
                                                    <h1 className="text-2xl md:text-5xl font-black mb-2 md:mb-5 leading-tight line-clamp-2">{comingSoonItems[currentHeroIndex].title}</h1>
                                                    <div className="flex items-center gap-4 text-[10px] md:text-xs font-bold">
                                                        <span className="flex items-center gap-1">★ {comingSoonItems[currentHeroIndex].rating}</span>
                                                        <span className="flex items-center gap-1">👥 {comingSoonItems[currentHeroIndex].viewers} Anticipating</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : <div className="animate-pulse bg-gray-800 w-full h-full"></div>}
                                    </div>
                                    <div className="w-full lg:w-[340px] flex flex-col">
                                        <h2 className="text-lg md:text-xl font-bold mb-4 md:mb-5 tracking-tight">Coming soon</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3">
                                            {comingSoonItems.slice(0, 3).map(item => (
                                                <div key={item.id} onClick={() => openDetails(item.id, item.type)} className="flex items-center gap-4 p-2 bg-white/40 rounded-2xl hover:bg-white/70 cursor-pointer transition-colors backdrop-blur-sm border border-white/20">
                                                    <img src={item.image} className="w-[100px] md:w-[110px] h-[64px] md:h-[72px] rounded-xl object-cover" />
                                                    <div className="overflow-hidden">
                                                        <h3 className="font-bold truncate text-sm md:text-[15px]">{item.title}</h3>
                                                        <p className="text-[10px] text-gray-500 font-bold">{item.dateFormatted}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="mb-8 md:mb-10 flex items-center">
                                    <span className="hidden md:block mr-6 w-16 text-sm font-extrabold leading-tight">Find by genre</span>
                                    <div className="flex flex-1 gap-2.5 overflow-x-auto no-scrollbar py-2">
                                        {GENRES_BOARD.map(g => (
                                            <button key={g.name} onClick={() => navigateToState({ boardGenre: boardGenre === g.name ? '' : g.name })} className={`flex shrink-0 items-center gap-2 px-5 py-2 md:py-2.5 rounded-full font-bold text-[10px] md:text-sm shadow-sm transition-all border ${boardGenre === g.name ? 'bg-black text-white' : 'bg-white/70 hover:bg-white'}`}>
                                                <Icon name={g.icon} /> {g.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <Section title={boardGenre ? `Trending ${boardGenre}` : "Trending Now"} items={trendingItems} onSelect={openDetails} isLoading={isTrendingLoading} />
                                <Section title={boardGenre ? `New ${boardGenre}` : "New Releases"} items={boardNewItems} onSelect={openDetails} isLoading={isBoardNewLoading} />
                                
                                <Section title="Popular Movies" items={popularMovies} onSelect={openDetails} isLoading={isSectionsLoading} />
                                <Section title="Popular TV Shows" items={popularTV} onSelect={openDetails} isLoading={isSectionsLoading} />
                                <Section title="Top Rated" items={topRated} onSelect={openDetails} isLoading={isSectionsLoading} />
                            </>
                        ) : (
                            <div className="animate-in fade-in duration-500">
                                <h1 className="text-2xl md:text-3xl font-black mb-6 md:mb-8 capitalize">{activeTab.toLowerCase()} Collection</h1>
                                {['MOVIES', 'SERIES'].includes(activeTab) && (
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8">
                                        <select value={filterGenre} onChange={e => navigateToState({ filterGenre: e.target.value, page: 1, fetchedShows: [] })} className="h-10 px-4 rounded-full border border-gray-300 bg-white/60 text-xs md:text-sm font-semibold outline-none focus:bg-white">
                                            <option value="">All Genres</option>
                                            {Object.keys(activeTab === 'SERIES' ? GENRE_MAP_TV : GENRE_MAP_MOVIE).map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                        <select value={filterYear} onChange={e => navigateToState({ filterYear: e.target.value, page: 1, fetchedShows: [] })} className="h-10 px-4 rounded-full border border-gray-300 bg-white/60 text-xs md:text-sm font-semibold outline-none focus:bg-white">
                                            <option value="">All Years</option>
                                            {[2026, 2025, 2024, 2023, 2022, 2021, 2020, 2019, 2018, 2017, 2016, 2015, 2014, 2013].map(y => <option key={y} value={y}>{y}</option>)}
                                        </select>
                                        <select value={filterCountry} onChange={e => navigateToState({ filterCountry: e.target.value, page: 1, fetchedShows: [] })} className="h-10 px-4 rounded-full border border-gray-300 bg-white/60 text-xs md:text-sm font-semibold outline-none focus:bg-white">
                                            <option value="">All Countries</option>
                                            {Object.keys(COUNTRY_MAP).map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-4 md:gap-6">
                                    {fetchedShows.map(show => (
                                        <div key={show.id} onClick={() => openDetails(show.id, show.type)} className="cursor-pointer group">
                                            <div className="aspect-[2/3] rounded-2xl overflow-hidden shadow-sm mb-2 md:mb-3">
                                                <img src={show.image.medium} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                            </div>
                                            <p className="text-[10px] md:text-[11px] font-bold text-gray-500 mb-0.5 md:mb-1">★ {show.rating.average} TMDb</p>
                                            <h3 className="text-xs md:text-sm font-bold truncate">{show.name}</h3>
                                        </div>
                                    ))}
                                </div>
                                {isLoading && <div className="py-10 text-center flex justify-center"><div className="w-8 h-8 border-4 border-gray-300 border-t-black rounded-full animate-spin"></div></div>}
                            </div>
                        )}
                    </main>

                    {/* Trailer Modal */}
                    {isTrailerModalOpen && trailerKey && (
                        <div 
                            className="fixed inset-0 z-[200] flex items-center justify-center bg-black/95 p-4 transition-opacity duration-300 animate-in fade-in"
                            onClick={() => setIsTrailerModalOpen(false)}
                        >
                            <div 
                                className="relative w-full max-w-4xl aspect-video rounded-3xl overflow-hidden bg-black shadow-2xl border border-white/15 animate-in zoom-in-95 duration-300"
                                onClick={(e) => e.stopPropagation()}
                            >
                                {/* Direct YouTube Fallback Button Header */}
                                <div className="absolute top-4 left-4 z-50 flex gap-2">
                                    <a 
                                        href={`https://www.youtube.com/watch?v=${trailerKey}`} 
                                        target="_blank" 
                                        rel="noopener noreferrer" 
                                        className="flex items-center gap-1.5 px-3.5 py-1.5 text-xs font-black rounded-full bg-red-600 hover:bg-red-700 text-white shadow-lg transition-transform active:scale-95 border border-red-500/10"
                                    >
                                        <Icon name="ExternalLink" className="h-3.5 w-3.5" />
                                        <span>Watch on YouTube</span>
                                    </a>
                                </div>

                                <button 
                                    onClick={() => setIsTrailerModalOpen(false)}
                                    className="absolute top-4 right-4 z-50 p-2 rounded-full bg-black/50 text-white hover:bg-black/85 transition-colors border border-white/10 focus:outline-none"
                                >
                                    <Icon name="X" className="h-5 w-5" />
                                </button>
                                
                                <iframe 
                                    src={computedTrailerEmbedUrl}
                                    title="Official Trailer Player"
                                    className="w-full h-full border-0 bg-black"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    allowFullScreen
                                ></iframe>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
