<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="https://ik.imagekit.io/xfifcyvcg/P_icon.ico?updatedAt=1748049193174" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Image Gallery</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f5f5;
      display: grid;
      grid-template-columns: 250px 1fr;
      grid-template-rows: 100vh;
    }

    .sidebar {
      background: white;
      padding: 20px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    .filter-section, .upload-section, .tags-section {
      margin-bottom: 20px;
    }

    .filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .related-image-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      background-color: #fff8e1;
      padding: 8px;
      border-radius: 8px;
    }

    .tag-bubble {
      background-color: #e0f7fa;
      color: #00796b;
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 0.8rem;
      display: inline-block;
      white-space: nowrap;
    }

    .related-tag-bubble {
      background-color: #ffecb3;
      color: #5d4037;
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 0.8rem;
      display: inline-block;
      white-space: nowrap;
    }

    .card-info h4 {
      margin: 10px 0 5px 0;
      font-size: 1.1rem;
      color: #333;
    }

    .filter-options button {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .filter-options button:hover {
      background: #e0e0e0;
    }

    .tag-input {
      display: flex;
      margin-bottom: 10px;
    }

    .tag-input input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px 0 0 4px;
    }

    .filter-options button.active {
      background: #4caf50 !important;
      color: white !important;
      border-color: #4caf50 !important;
    }

    .tag-input button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
    }

    .common-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .common-tags button {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .main-content {
      padding: 20px;
      overflow-y: auto;
    }
    
    /* --- Pinterest/Masonry Layout CSS --- */
    .gallery {
      column-count: 3; /* Adjust number of columns */
      column-gap: 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: inline-block;
      width: 100%;
      break-inside: avoid;
      position: relative;
      cursor: pointer;
    }
    
    .card:hover .card-actions {
      opacity: 1;
    }
    
    .card img {
      width: 100%;
      height: auto; /* This is key for masonry */
      display: block;
      border-radius: 8px 8px 0 0;
    }
    /* --- End Masonry --- */


    .card-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card-actions button {
      background: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .card-actions button:hover {
      background: white;
      transform: scale(1.1);
    }

    .delete-btn {
      color: #f44336;
    }

    .edit-btn {
      color: #2196F3;
    }

    .card-info {
      padding: 15px;
    }

    .card-info h4 {
      margin: 0 0 10px 0;
      font-size: 1.2rem;
    }

    .add-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4caf50;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 100;
    }

    .videos-btn {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: #FF5722;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 100;
    }

    .celebrities-btn {
      position: fixed;
      bottom: 140px;
      right: 20px;
      background: #FFC107;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 100;
    }

    .models-btn {
      position: fixed;
      bottom: 200px;
      right: 20px;
      background: #9c27b0;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 100;
    }

    /* --- NEW: Alphabetical Navigation Bar Styles --- */
    .alpha-nav {
      background-color: black;
      padding: 12px;
      text-align: center;
      margin-bottom: 20px;
      border-radius: 8px;
      font-size: 1rem;
    }
    .alpha-nav span {
      color: #00bcd4; /* Teal */
      margin-right: 15px;
      font-weight: bold;
    }
    .alpha-nav a {
      color: #00bcd4; /* Teal */
      margin: 0 7px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.2s;
    }
    .alpha-nav a:hover {
      color: #80deea; /* Lighter teal */
    }
    /* --- End New Styles --- */

    /* Image Viewer Styles */
    .image-viewer {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .image-viewer-content {
      position: relative;
      width: 90%;
      height: 80%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }

    .image-viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.1s ease;
      transform-origin: 0 0;
      cursor: grab;
    }

    .image-viewer img.grabbing {
      cursor: grabbing;
    }

    .image-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.3);
      border: none;
      color: white;
      font-size: 2rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .image-counter {
      color: white;
      text-align: center;
      margin-top: 10px;
    }

    .image-viewer-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
    }

    .image-viewer-footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }

    .upload-related-btn {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    .upload-related-btn:hover {
      background: #45a049;
    }

    /* Zoom Controls */
    .zoom-controls {
      position: absolute;
      bottom: 80px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .zoom-btn {
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .zoom-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .reset-zoom {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .reset-zoom:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    /* Related Image Tags Popup */
    .related-tags-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .related-tags-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      max-width: 90%;
    }

    /* Popup Styles */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #relatedImagesPopup {
      z-index: 3000;
    }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      max-width: 90%;
      position: relative;
    }

    .popup-content h3 {
      margin-top: 0;
    }

    .popup-content input, 
    .popup-content textarea,
    .popup-content select {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .popup-content button {
      margin-right: 8px;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .popup-content button[type="submit"] {
      background: #4caf50;
      color: white;
    }

    .popup-content button[type="button"] {
      background: #f0f0f0;
    }

    .error-message {
      color: red;
      font-size: 0.8rem;
      margin-bottom: 10px;
    }

    .selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .selected-tag {
      background: #e0f7fa;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
    }

    .selected-tag button {
      background: none;
      border: none;
      color: #666;
      margin-left: 5px;
      cursor: pointer;
      padding: 0;
    }

    /* Responsive adjustments */
    @media (max-width: 1200px) {
      .gallery {
        column-count: 3;
      }
    }

    @media (max-width: 992px) {
      .gallery {
        column-count: 2;
      }
    }

    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto; /* Let content determine height */
      }
       /* FIX: Adjust sidebar for mobile */
      .sidebar {
        position: static;
        height: auto;
        overflow-y: visible;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }
      .gallery {
        column-count: 1;
      }
    }
  </style>
</head>
<body>


  <aside class="sidebar">
    <div class="filter-section">
      <h3>Filter by Tags</h3>
      <div class="filter-options" id="filterTags">
        </div>
    </div>

    <div class="upload-section">

      <a onclick="scrollToLetter('E')">E</a> <a onclick="scrollToLetter('F')">F</a> <a onclick="scrollToLetter('G')">G</a> <a onclick="scrollToLetter('H')">H</a>

      <a onclick="scrollToLetter('Y')">Y</a> <a onclick="scrollToLetter('Z')">Z</a>
    </div>

    <div class="toolbar" style="margin-bottom: 20px; display: flex; align-items: center; justify-content: flex-end;">
        <label for="sort-select" style="margin-right: 10px; font-size: 0.9rem; color: #555;">Sort by:</label>
        <select id="sort-select" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; background-color: white; font-size: 0.9rem;">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="az">A–Z</option>
        </select>
    </div>

    <div class="gallery" id="gallery"></div>
    
    <div class="related-images-section" id="relatedImagesSection" style="display: none;">
      <h2>Related Images</h2>
      <div class="filter-options" id="relatedImageFilterTags"></div>
      <div class="gallery" id="relatedImagesGallery"></div>
    </div>
  </main>

  <button class="add-btn" onclick="openPopup()">＋</button>
  <button class="videos-btn" onclick="window.location.href='videos.html'">🎬</button>
  <button class="celebrities-btn" onclick="window.location.href='celebrities.html'">🌟</button>
  <button class="models-btn" onclick="window.location.href='models.html'">👗</button>

  <div class="image-viewer" id="imageViewer">
    <span class="image-viewer-close" onclick="closeImageViewer()">&times;</span>
    <div class="image-viewer-content" id="viewerContent">
      <img id="viewerImage" src="" alt="">
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <button class="zoom-btn" onclick="zoomOut()">-</button>
      </div>
      <button class="reset-zoom" onclick="resetZoom()">Reset Zoom</button>
    </div>
    <div class="image-nav">
      <button class="nav-btn" onclick="prevImage()">&#10094;</button>
   
   <button class="nav-btn" onclick="nextImage()">&#10095;</button>
    </div>
    <div class="image-counter" id="imageCounter"></div>
    <div class="image-viewer-footer">
      <button class="upload-related-btn" onclick="openRelatedImagesPopup()">Upload Related Images</button>
      <button class="upload-related-btn" onclick="openRelatedTagsPopup()" style="margin-top: 10px;">Edit Related Image Tags</button>
    </div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-content">
      <h3>Upload New Image</h3>
      <form id="cardForm">
        <input id="title" placeholder="Title" required />
        <textarea id="imageUrl" rows="3" placeholder="Image URL" required></textarea>
  
      
        <div id="selectedTagsContainer" class="selected-tags"></div>
        
        <select id="availableTags">
          <option value="">Select tags to add</option>
          </select>
        <button type="button" onclick="addTagToSelection()">Add Tag</button>
        
        <div id="errorMessage" class="error-message"></div>
        <div>
      
    <button type="submit">Upload</button>
          <button type="button" onclick="closePopup()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="popup" id="relatedImagesPopup">
    <div class="popup-content">
      <h3>Upload Related Images</h3>
      <form id="relatedImagesForm">
        <textarea id="relatedImageUrls" rows="5" placeholder="Enter image URLs, one per line"></textarea>
        
        <div id="relatedImagesErrorMessage" class="error-message"></div>
     
   <div>
          <button type="button" onclick="addRelatedImages()">Upload</button>
          <button type="button" onclick="closeRelatedImagesPopup()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="related-tags-popup" id="relatedTagsPopup">
    <div class="related-tags-content">
      <h3>Edit Related Image Tags</h3>
      <div id="currentRelatedImageInfo"></div>
      <div id="selectedRelatedTagsContainer" class="selected-tags"></div>
      
      <select id="availableRelatedTags">
       
 <option value="">Select tags to add</option>
        </select>
      <button type="button" onclick="addTagToRelatedImageSelection()">Add Tag</button>
      
      <div id="relatedTagsErrorMessage" class="error-message"></div>
      <div>
        <button type="button" onclick="saveRelatedImageTags()">Save</button>
        <button type="button" onclick="closeRelatedTagsPopup()">Cancel</button>
      </div>
    </div>
  </div>
